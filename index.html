<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChitChat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<script>
if(!localStorage.getItem("email")){
window.location.replace("login.html")
}
</script>

<div class="app">

<div id="groupScreen" class="screen">

<div class="topbar">
<h2>Gruplar</h2>
</div>

<div id="groupList" class="groupList"></div>

<button id="createGroupBtn" class="floatingBtn">+</button>

</div>


<div id="chatScreen" class="screen hidden">

<div class="chatHeader">

<button id="backBtn">←</button>

<div style="flex: 1; text-align: center;">
  <div id="groupTitle" style="font-weight: bold;">Grup</div>
  <div id="userRole" style="font-size: 12px; margin-top: 4px;">Rol</div>
</div>

<button id="settingsBtn" class="hidden">⚙</button>

</div>

<div id="messages" class="messages"></div>

<div class="messageBox">
<input id="messageInput" placeholder="Mesaj yaz">
<button id="sendBtn">Gönder</button>
</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
