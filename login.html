<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ChitChat Login</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body class="login-body">
  
  <div class="login-box">
    
    <h1>ChitChat</h1>
    
    <input type="text" id="email" placeholder="E-posta">
    <input type="password" id="password" placeholder="Şifre">
    
    <p id="error" style="color:#f87171; font-size:13px; margin-bottom:12px; min-height:18px;"></p>

    <button id="loginBtn">Giriş Yap</button>
    
    <div class="createAccount">
      Hesabın yok mu?
      <a href="register.html">Hesap Oluştur</a>
    </div>
    
  </div>
  
  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const errorEl = document.getElementById("error");

    document.getElementById("loginBtn").onclick = async () => {

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      errorEl.innerText = "";

      if (!email || !password) {
        errorEl.innerText = "Bilgileri doldur!";
        return;
      }

      try {

        const cred = await signInWithEmailAndPassword(auth, email, password);

        // E-posta doğrulanmamışsa verify sayfasına gönder
        if (!cred.user.emailVerified) {
          window.location.replace("verify.html");
          return;
        }

        // Firestore'dan profil bilgilerini çek
        const snap = await getDoc(doc(db, "users", cred.user.uid));

        if (!snap.exists()) {
          errorEl.innerText = "Kullanıcı profili bulunamadı.";
          return;
        }

        const data = snap.data();

        localStorage.setItem("email",    cred.user.email);
        localStorage.setItem("nickname", data.nickname);
        localStorage.setItem("userNo",   String(data.userNo));

        window.location.replace("index.html");

      } catch (e) {
        console.error("Login hatası:", e.code, e.message);

        if (e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") {
          errorEl.innerText = "E-posta veya şifre hatalı.";
        } else if (e.code === "auth/user-not-found") {
          errorEl.innerText = "Bu e-posta ile kayıtlı kullanıcı yok.";
        } else if (e.code === "auth/invalid-email") {
          errorEl.innerText = "Geçersiz e-posta formatı.";
        } else if (e.code === "auth/too-many-requests") {
          errorEl.innerText = "Çok fazla deneme. Biraz bekle.";
        } else if (e.code === "auth/network-request-failed") {
          errorEl.innerText = "İnternet bağlantısı hatası.";
        } else {
          errorEl.innerText = "Hata: " + e.code;
        }
      }

    };
  </script>
  
</body>

</html>
