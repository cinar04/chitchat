<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ChitChat - Profil Kurulumu</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body class="login-body">
  
  <div class="login-box verify-box">
    
    <div class="verify-icon">⚙</div>
    <h1>Profil Kurulumu</h1>
    
    <p>
      Google hesabınız başarıyla bağlandı!<br><br>
      E-posta/Şifre ile de giriş yapabilmek için lütfen aşağıdaki bilgileri doldurun.
    </p>
    
    <input type="text" id="nickname" placeholder="Takma Ad (Nickname)">
    <input type="password" id="password" placeholder="Şifre (Min. 8 karakter)">
    
    <div class="passwordBar">
      <div id="bar"></div>
    </div>
    
    <p id="error" style="color:#f87171; font-size:13px; margin-bottom:12px; min-height:18px;"></p>
    
    <button id="setupBtn">Profil Kurulumunu Tamamla</button>
    
  </div>
  
  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      updateProfile,
      updatePassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
      doc,
      updateDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const nicknameInput = document.getElementById("nickname");
    const passwordInput = document.getElementById("password");
    const bar = document.getElementById("bar");
    const errorEl = document.getElementById("error");
    const setupBtn = document.getElementById("setupBtn");

    let passwordValid = false;
    let currentUser = null;

    // Kullanıcı giriş durumunu kontrol et
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace("login.html");
        return;
      }

      currentUser = user;

      // Eğer zaten şifre belirlediyse, direkt ana sayfaya git
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists() && userDoc.data().passwordSet === true) {
        window.location.replace("index.html");
        return;
      }

      // Email'i göster
      document.querySelector(".verify-box p").innerHTML = `
        <strong>${user.email}</strong> adresi ile giriş yapıyorsunuz.<br><br>
        E-posta/Şifre ile de giriş yapabilmek için lütfen aşağıdaki bilgileri doldurun.
      `;
    });

    // Şifre güç göstergesi
    passwordInput.addEventListener("input", () => {
      const pass = passwordInput.value;
      const lengthOk = pass.length >= 8;
      const specialOk = /[!@#$%^&*(),.?":{}|<>]/.test(pass);

      let strength = 0;
      if (pass.length >= 4) strength += 25;
      if (pass.length >= 8) strength += 25;
      if (/[A-Z]/.test(pass)) strength += 25;
      if (/[!@#$%^&*(),.?":{}|<>]/.test(pass)) strength += 25;

      bar.style.width = strength + "%";
      bar.style.background = strength < 50 ? "red" : strength < 75 ? "orange" : "lime";

      passwordValid = lengthOk && specialOk;
    });

    // Profil kurulumunu tamamla
    setupBtn.onclick = async () => {
      const nickname = nicknameInput.value.trim();
      const password = passwordInput.value.trim();

      errorEl.innerText = "";

      if (!nickname) {
        errorEl.innerText = "Takma ad boş olamaz!";
        return;
      }

      if (!password || !passwordValid) {
        errorEl.innerText = "Şifre min. 8 karakter ve özel karakter içermeli!";
        return;
      }

      if (!currentUser) {
        errorEl.innerText = "Kullanıcı bulunamadı!";
        return;
      }

      try {
        setupBtn.disabled = true;
        setupBtn.innerText = "Ayarlanıyor...";

        // Şifreyi belirle
        await updatePassword(currentUser, password);

        // Firestore'da şifre belirlenmiş olarak işaretle
        await updateDoc(doc(db, "users", currentUser.uid), {
          passwordSet: true
        });

        // localStorage'a kaydı güncelle
        localStorage.setItem("email", currentUser.email);
        localStorage.setItem("nickname", nickname);

        // Ana sayfaya yönlendir
        window.location.replace("index.html");

      } catch (e) {
        console.error("Hata:", e);
        if (e.code === "auth/weak-password") {
          errorEl.innerText = "Şifre çok zayıf!";
        } else if (e.code === "auth/requires-recent-login") {
          errorEl.innerText = "Lütfen tekrar giriş yapın!";
        } else {
          errorEl.innerText = "Hata: " + e.message;
        }
        setupBtn.disabled = false;
        setupBtn.innerText = "Profil Kurulumunu Tamamla";
      }
    };

  </script>
  
</body>

</html>
