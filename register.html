<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ChitChat Register</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body class="login-body">
  
  <div class="login-box">
    
    <h1>Hesap Oluştur</h1>
    
    <input type="text" id="nickname" placeholder="Nickname">
    <input type="text" id="email" placeholder="E-posta">
    <input type="password" id="password" placeholder="Şifre">
    
    <div class="passwordBar">
      <div id="bar"></div>
    </div>
    
    <button id="registerBtn">Kayıt Ol</button>
    
    <div class="createAccount">
      Zaten hesabın var mı?
      <a href="login.html">Giriş Yap</a>
    </div>
    
  </div>
  
  <script type="module">
    import { db } from "./firebase.js";
    import {
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const passwordInput = document.getElementById("password");
    const bar = document.getElementById("bar");
    const btn = document.getElementById("registerBtn");
    
    let passwordValid = false;
    
    passwordInput.addEventListener("input", () => {
      
      const pass = passwordInput.value;
      
      const lengthOk = pass.length >= 8;
      const specialOk = /[!@#$%^&*(),.?":{}|<>]/.test(pass);
      
      let strength = 0;
      
      if (pass.length >= 4) strength += 25;
      if (pass.length >= 8) strength += 25;
      if (/[A-Z]/.test(pass)) strength += 25;
      if (/[!@#$%^&*(),.?":{}|<>]/.test(pass)) strength += 25;
      
      bar.style.width = strength + "%";
      
      if (strength < 50) {
        bar.style.background = "red";
      }
      else if (strength < 75) {
        bar.style.background = "orange";
      }
      else {
        bar.style.background = "lime";
      }
      
      passwordValid = lengthOk && specialOk;
      
    });
    
    btn.addEventListener("click", async () => {
      
      const nickname = document.getElementById("nickname").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value.trim();
      
      if (!nickname || !email || !password) {
        alert("Tüm alanları doldur");
        return;
      }
      
      if (!passwordValid) {
        alert("Şifre yeterince güçlü değil");
        return;
      }
      
      const ref = doc(db, "users", nickname);
      
      const snap = await getDoc(ref);
      
      if (snap.exists()) {
        alert("Bu nickname alınmış");
        return;
      }
      
      await setDoc(ref, {
        nickname: nickname,
        email: email,
        password: password
      });
      
      alert("Hesap oluşturuldu");
      
      window.location.href = "login.html";
      
    });
  </script>
  
</body>

</html>
